line-length = 120
target-version = "py39"

[lint]
select = [
    "F",        # Pyflakes
    "E", "W",   # pycodestyle
    "I",        # isort
    "UP",       # pyupgrade
    "B",        # flake8-bugbear
    "SIM",      # flake8-simplify
    "RET",      # flake8-return
    "C4",       # flake8-comprehensions
    "FURB",     # refurb
    "Q",        # flake8-quotes
]

ignore = [
    # Qt/QGIS naming conventions (camelCase overrides, signals, plugin dir)
    "N802",
    "N815",
    "N999",

    # Relative imports are correct for QGIS plugins
    "TID252",

    # Intentional patterns in plugin code
    "BLE001",   # bare except Exception (safety pattern for C++ host)
    "SIM105",   # try/except pass vs contextlib.suppress
    "SIM102",   # collapsible if (readability preference)
    "SIM108",   # ternary operator (readability preference)
    "SIM115",   # open() without context manager
    "DTZ005",   # datetime.now() without tz (local time is correct)
    "EXE001",   # shebang without +x (subprocess worker)
    "ICN001",   # unconventional import alias (intentional)
]

[lint.per-file-ignores]
# Closures in retry loop are correctly scoped per iteration
"src/workers/prediction_worker.py" = ["B023"]
"src/core/checkpoint_manager.py" = ["B023"]
