name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff flake8

      - name: Ruff
        run: ruff check src/

      - name: Flake8
        run: flake8 src/

      - name: Compile check
        run: find src/ -name '*.py' -exec python -m py_compile {} +
